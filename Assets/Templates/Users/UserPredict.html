 {% extends 'Users/UserHome.html' %}
{% block contents %}
{% load static %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4 shadow-lg">
                <h4 class="mb-4 text-center text-primary">Upload an Image</h4>
                <form action="{% url 'predict' %}" method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="img" class="form-label fw-bold">Choose File</label>
                        <input class="form-control" type="file" name="img" id="img">
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Upload</button>
                    </div>
                </form>

                {% if result %}
                <div class="mt-5 text-center">
                    <h5 class="text-secondary mb-3">Prediction Result</h5>
                    <div class="alert {% if result == 'Tumor detected' %}alert-danger{% else %}alert-success{% endif %} shadow-sm">
                        <strong class="display-6">{{ result }}</strong>
                        <p class="mb-0 mt-2">Probability: {{ score }}%</p>
                    </div>
                    {% if uploaded_file_url %}
                    <div class="mt-4">
                        <img src="{{ uploaded_file_url }}" alt="Uploaded brain MRI" class="img-fluid rounded border shadow" style="max-height: 300px;">
                    </div>
                    {% endif %}
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
