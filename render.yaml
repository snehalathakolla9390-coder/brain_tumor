services:
  - type: web
    name: brain_tumor
    env: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn Detecting_and_Diagnosing_Brain_Tumor_MRI_Image.wsgi"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DJANGO_SETTINGS_MODULE
        value: Detecting_and_Diagnosing_Brain_Tumor_MRI_Image.settings
